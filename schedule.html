<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>F1 Pulse - Race Calendar</title>
    <meta name="description" content="Complete Formula 1 race calendar with dates, circuits, and results for every Grand Prix.">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><defs><linearGradient id='g' x1='0%25' y1='0%25' x2='100%25' y2='100%25'><stop offset='0%25' stop-color='%23ff1801'/><stop offset='100%25' stop-color='%23e10600'/></linearGradient></defs><rect fill='url(%23g)' rx='16' width='100' height='100'/><text x='50' y='70' font-size='54' font-weight='900' fill='white' text-anchor='middle' font-family='sans-serif'>F1</text></svg>">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="preconnect" href="https://flagcdn.com">
    <link href="https://fonts.googleapis.com/css2?family=Titillium+Web:wght@300;400;600;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <nav id="main-nav"></nav>

    <main class="page-content">
        <div class="container">
            <div class="page-header">
                <div class="flex-between" style="flex-wrap:wrap;gap:16px">
                    <div>
                        <h1>Race <span class="text-red">Calendar</span></h1>
                        <p class="subtitle" id="season-label">Loading schedule...</p>
                    </div>
                    <div class="season-selector">
                        <select id="season-select" onchange="loadSeason(this.value)"></select>
                    </div>
                </div>
            </div>

            <!-- Filter tabs -->
            <div class="tabs" id="filter-tabs">
                <button class="tab-btn active" data-filter="all" onclick="filterRaces('all')">All Races</button>
                <button class="tab-btn" data-filter="upcoming" onclick="filterRaces('upcoming')">Upcoming</button>
                <button class="tab-btn" data-filter="completed" onclick="filterRaces('completed')">Completed</button>
            </div>

            <!-- Race Grid -->
            <div id="races-container" class="grid-3"></div>
        </div>
    </main>

    <footer id="main-footer"></footer>

    <script src="js/api.js"></script>
    <script src="js/components.js"></script>
    <script src="js/schedule.js"></script>
</body>
</html>
