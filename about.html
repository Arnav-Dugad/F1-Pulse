<!DOCTYPE html>
<html lang="en">
<head>

<body>
    <nav id="main-nav"></nav>

    <main class="page-content">
        <section class="about-hero section">
            <div class="container">
                <div class="about-hero-shell">
                    <div>
                        <p class="about-kicker">Inside The Grid</p>
                        <h1>Driver <span class="text-red">Biographies</span> and Team Profiles</h1>
                        <p class="subtitle" id="about-subtitle">Loading 2026 season profiles...</p>
                    </div>
                    <div class="about-hero-metrics" id="about-hero-metrics"></div>
                </div>
            </div>
        </section>

        <div class="container">
            <section class="section about-controls" id="about-controls">
                <div class="about-control-shell">
                    <div class="about-control-field">
                        <label for="about-team-filter">Team Filter</label>
                        <select id="about-team-filter">
                            <option value="all">All Teams</option>
                        </select>
                    </div>
                    <div class="about-control-toggle" role="tablist" aria-label="About page view">
                        <button type="button" class="about-view-btn active" data-view="all" aria-pressed="true">All</button>
                        <button type="button" class="about-view-btn" data-view="drivers" aria-pressed="false">Drivers</button>
                        <button type="button" class="about-view-btn" data-view="teams" aria-pressed="false">Teams</button>
                    </div>
                    <p class="about-results-meta" id="about-results-meta">Showing all drivers and teams.</p>
                </div>
            </section>

            <section class="section" id="driver-bios-section">
                <div class="section-header">
                    <h2>Drivers</h2>
                    <a href="drivers.html" class="section-link">Championship</a>
                </div>
                <div id="about-driver-grid" class="about-driver-grid"></div>
            </section>

            <section class="section" id="team-profiles-section">
                <div class="section-header">
                    <h2>Teams</h2>
                    <a href="teams.html" class="section-link">Constructors</a>
                </div>
                <div id="about-team-grid" class="about-team-grid"></div>
            </section>
        </div>

    <footer id="main-footer"></footer>

    <script src="js/api.js"></script>
