<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>F1 Pulse - Race Details</title>
    <meta name="description" content="Detailed Formula 1 race results including qualifying, race positions, pit stops, tire strategy, and fastest laps.">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><defs><linearGradient id='g' x1='0%25' y1='0%25' x2='100%25' y2='100%25'><stop offset='0%25' stop-color='%23ff1801'/><stop offset='100%25' stop-color='%23e10600'/></linearGradient></defs><rect fill='url(%23g)' rx='16' width='100' height='100'/><text x='50' y='70' font-size='54' font-weight='900' fill='white' text-anchor='middle' font-family='sans-serif'>F1</text></svg>">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="preconnect" href="https://flagcdn.com">
    <link href="https://fonts.googleapis.com/css2?family=Titillium+Web:wght@300;400;600;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <nav id="main-nav"></nav>

    <main class="page-content">
        <div class="container">
            <div class="page-header" id="race-header">
                <h1 id="race-title">Loading Race...</h1>
                <p class="subtitle" id="race-subtitle"></p>
            </div>

            <div class="race-info-grid" id="race-info" style="display:none"></div>

            <section class="section" id="weather-section" style="display:none;margin-top:24px">
                <div class="section-header"><h2>Weather Conditions</h2></div>
                <div id="weather-container"></div>
            </section>

            <div class="tabs" id="result-tabs" style="margin-top:32px;display:none">
                <button class="tab-btn active" data-tab="race" onclick="switchTab('race')">Race</button>
                <button class="tab-btn" data-tab="qualifying" onclick="switchTab('qualifying')">Qualifying</button>
                <button class="tab-btn" data-tab="sprint" onclick="switchTab('sprint')">Sprint</button>
                <button class="tab-btn" data-tab="pitstops" onclick="switchTab('pitstops')">Pit Stops</button>
                <button class="tab-btn" data-tab="tires" onclick="switchTab('tires')" style="display:none">Tire Strategy</button>
                <button class="tab-btn" data-tab="laptimes" onclick="switchTab('laptimes')" style="display:none">Lap Times</button>
                <button class="tab-btn" data-tab="teamradio" onclick="switchTab('teamradio')" style="display:none">Team Radio</button>
                <button class="tab-btn" data-tab="racecontrol" onclick="switchTab('racecontrol')" style="display:none">Race Control</button>
            </div>

            <div id="podium-container" style="display:none"></div>

            <div id="race-results"></div>
            <div id="qualifying-results" style="display:none"></div>
            <div id="sprint-results" style="display:none"></div>
            <div id="pitstops-results" style="display:none"></div>
            <div id="tires-results" style="display:none"></div>
            <div id="laptimes-results" style="display:none"></div>
            <div id="teamradio-results" style="display:none"></div>
            <div id="racecontrol-results" style="display:none"></div>

            <div id="upcoming-info" style="display:none"></div>
        </div>
    </main>

    <footer id="main-footer"></footer>

    <script src="js/api.js"></script>
    <script src="js/components.js"></script>
    <script src="js/race-detail.js"></script>
</body>
</html>
