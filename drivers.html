<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>F1 Pulse - Driver Standings</title>
    <meta name="description" content="Formula 1 driver championship standings with real-time points, wins, and driver profiles.">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><defs><linearGradient id='g' x1='0%25' y1='0%25' x2='100%25' y2='100%25'><stop offset='0%25' stop-color='%23ff1801'/><stop offset='100%25' stop-color='%23e10600'/></linearGradient></defs><rect fill='url(%23g)' rx='16' width='100' height='100'/><text x='50' y='70' font-size='54' font-weight='900' fill='white' text-anchor='middle' font-family='sans-serif'>F1</text></svg>">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="preconnect" href="https://flagcdn.com">
    <link href="https://fonts.googleapis.com/css2?family=Titillium+Web:wght@300;400;600;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <nav id="main-nav"></nav>

    <main class="page-content">
        <div class="container">
            <div class="page-header">
                <h1>Driver <span class="text-red">Standings</span></h1>
                <p class="subtitle" id="season-label">Loading current season...</p>
            </div>

            <!-- View Toggle -->
            <div class="tabs" id="view-tabs">
                <button class="tab-btn active" data-view="grid" onclick="switchView('grid')">Grid</button>
                <button class="tab-btn" data-view="table" onclick="switchView('table')">Table</button>
            </div>

            <!-- Driver Grid View -->
            <div id="drivers-grid" class="grid-4"></div>

            <!-- Driver Table View -->
            <div id="drivers-table" style="display:none"></div>
        </div>
    </main>

    <footer id="main-footer"></footer>

    <script src="js/api.js"></script>
    <script src="js/components.js"></script>
    <script src="js/drivers.js"></script>
</body>
</html>
